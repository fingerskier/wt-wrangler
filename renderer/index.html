<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self';" />
    <title>Wrangler</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="dir-row">
        <button id="pickDir" type="button">Open Folder…</button>
        <span id="dirPath" class="muted" title="Click to save to root folder">(no folder)</span>
        <span id="saveHint" class="save-hint hidden"></span>
        <button id="ghUpdate" type="button" class="hidden" title="git add -A, commit, push">GH Update</button>
        <button id="appSettingsBtn" type="button" title="App settings">⚙</button>
      </div>
    </header>

    <main class="app">
      <aside class="sidebar">
        <div class="sidebar-head">
          <h2>Layouts</h2>
          <button id="newLayout" type="button" class="small" disabled>+ New</button>
        </div>
        <ul id="layoutList" class="layout-list"></ul>
      </aside>

      <section class="editor" id="editor">
        <div class="empty">Open a folder of layout JSON files, or create a new one.</div>
      </section>
    </main>

    <template id="tpl-editor">
      <div class="editor-inner">
        <div class="editor-head">
          <label>Name <input data-field="name" type="text" /></label>
          <label>Window <input data-field="window" type="text" /></label>
          <div class="editor-actions">
            <button data-action="undo" type="button" title="Undo (Ctrl+Z)">↶</button>
            <button data-action="redo" type="button" title="Redo (Ctrl+Y)">↷</button>
            <button data-action="palette" type="button" class="palette-btn" title="Window style…">🎨</button>
            <button data-action="save" type="button" class="primary">Save</button>
            <button data-action="run" type="button" class="success">Run</button>
            <button data-action="delete" type="button" class="danger">Delete</button>
          </div>
        </div>
        <div class="tabbar" data-tabbar></div>
        <div class="tab-view" data-tab-view></div>
        <details class="preview">
          <summary>Command preview</summary>
          <pre data-preview></pre>
        </details>
      </div>
    </template>

    <template id="tpl-tabbar-item">
      <button type="button" class="tabbar-item" data-tabbar-item>
        <span class="tabbar-title" data-tab-title></span>
        <span class="tabbar-close" data-action="removeTab" title="Remove tab">×</span>
      </button>
    </template>

    <template id="tpl-tab-view">
      <div class="tab-view-inner">
        <div class="pane-tree" data-pane-tree></div>
      </div>
    </template>

    <template id="tpl-pane">
      <div class="pane-card" data-pane>
        <div class="pane-head">
          <span class="pane-label" data-pane-label></span>
          <div class="pane-actions">
            <button data-action="splitRight" type="button" class="split-btn" title="Split → (new pane right)">│→</button>
            <button data-action="splitDown" type="button" class="split-btn" title="Split ↓ (new pane below)">─↓</button>
            <button data-action="removePane" type="button" class="danger small" title="Remove pane">×</button>
          </div>
        </div>
        <div class="pane-body">
          <label data-split-only>Split
            <select data-field="split">
              <option value="right">right</option>
              <option value="down">down</option>
              <option value="left">left</option>
              <option value="up">up</option>
            </select>
          </label>
          <label data-split-only>Size <input data-field="size" type="number" step="0.05" min="0.05" max="0.95" /></label>
          <label>Profile <select data-field="profile"></select></label>
          <label>Dir
            <span class="with-picker">
              <input data-field="dir" type="text" />
              <button type="button" data-action="pickDir" title="Browse…">…</button>
            </span>
          </label>
          <label class="wide">Command <input data-field="command" type="text" /></label>
          <label class="wide">Post-command (runs in same shell after main exits)
            <input data-field="postCommand" type="text" placeholder="optional" />
          </label>
          <label>Post-delay (s) <input data-field="postDelay" type="number" step="1" min="0" placeholder="3" /></label>
        </div>
      </div>
    </template>

    <div id="toast" class="toast hidden"></div>

    <div id="appSettingsRoot" class="modal-root hidden" aria-hidden="true">
      <div class="modal-backdrop" data-app-settings-dismiss></div>
      <div class="modal" role="dialog" aria-modal="true" aria-labelledby="appSettingsTitle">
        <header class="modal-head">
          <h3 id="appSettingsTitle">App Settings</h3>
          <button type="button" class="modal-close" data-app-settings-dismiss title="Close">×</button>
        </header>
        <div class="modal-body">
          <label class="settings-row">Theme
            <select data-setting="theme"></select>
          </label>
          <label class="settings-row">Default profile (used for new layouts)
            <input type="text" data-setting="defaultProfile" placeholder="(none)" />
          </label>
          <label class="settings-row">Default save sub-folder
            <input type="text" data-setting="defaultSaveSubdir" placeholder="(root)" />
          </label>
          <label class="settings-row inline">
            <input type="checkbox" data-setting="confirmOnDelete" />
            <span>Confirm before deleting layouts</span>
          </label>
          <p class="settings-hint">Sub-folder is relative to the open folder; it auto-selects on open if it exists.</p>
        </div>
        <footer class="modal-foot">
          <span class="spacer"></span>
          <button type="button" data-action="appSettingsCancel">Cancel</button>
          <button type="button" data-action="appSettingsSave" class="primary">Save</button>
        </footer>
      </div>
    </div>

    <div id="modalRoot" class="modal-root hidden" aria-hidden="true">
      <div class="modal-backdrop" data-modal-dismiss></div>
      <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <header class="modal-head">
          <h3 id="modalTitle">Window Style</h3>
          <button type="button" class="modal-close" data-modal-dismiss title="Close">×</button>
        </header>
        <div class="modal-body" id="modalBody"></div>
        <footer class="modal-foot">
          <button type="button" data-action="modalReset" class="danger small">Reset all</button>
          <span class="spacer"></span>
          <button type="button" data-action="modalCancel">Cancel</button>
          <button type="button" data-action="modalApply" class="primary">Apply</button>
        </footer>
      </div>
    </div>

    <script src="history.js"></script>
    <script src="paneTree.js"></script>
    <script src="windowStyle.js"></script>
    <script src="app.js"></script>
  </body>
</html>
